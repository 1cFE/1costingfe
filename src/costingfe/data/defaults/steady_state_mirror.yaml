# Default engineering parameters for MFE mirror
# Mirrors: simple geometry, high beta, end-loss DEC opportunity

p_input: 40.0  # Heating power [MW] (NBI-dominated)

# Heating mix for CAS22 costing (must sum to p_input)
p_nbi: 40.0  # NBI heating [MW] (primary heating for mirror)
p_ecrh: 0.0  # ECRH heating [MW]
p_icrf: 0.0  # ICRF heating [MW]
p_lhcd: 0.0  # LHCD heating [MW]

mn: 1.1  # Neutron energy multiplier
eta_p: 0.5  # Pumping efficiency
eta_couple: 0.8333  # NBI coupling; eta_pin = 0.60 x 0.8333 = 0.50
eta_de: 0.60  # DEC efficiency (end-plug DEC)
f_sub: 0.03  # Subsystem power fraction
f_dec: 0.3  # DEC fraction (significant end-loss recovery)
p_coils: 5.0  # Coil power [MW] (solenoid + mirror coils)
p_cool: 20.0  # Cooling power [MW]
p_pump: 1.5  # Pumping power [MW]
p_trit: 10.0  # Tritium processing power [MW]
p_house: 4.0  # Housekeeping power [MW]
p_cryo: 1.0  # Cryogenic power [MW]
p_aux_floor: 2.0  # MW; control/startup floor on auxiliary sustainment power
# Plug sustainment power [MW]. The ECH/NBI power holding the hot-electron tandem
# plug that builds the Fowler-Logan confining potential. In a real advanced-fuel
# tandem the plug is a SEPARATE sub-system from the central cell: it sustains the
# hot-electron population (T_e_plug below) and the plugging species, at a power
# cost that is charged into the mirror recirculating power. This is modelled as a
# FIXED per-machine plug power calibrated to the Realta Hammir design point, which
# holds its hot-electron plug with about 30 MW of plug NBI/ECH (Frank et al. 2024
# arXiv:2411.06644 sec. 3.5; the published Q = P_fus/P_NBI = 5.2 counts this
# 30 MW). A fixed-per-plug model (rather than scaling with n_p or central power)
# is the defensible 0D choice: the 0D model does not solve the plug density or
# trapping self-consistently, and the published anchor is a single design-point
# plug power, so the plug is costed as fixed hardware-plus-drive (matching the
# fixed n_plug_coils = 4 the CAS22 coil account already commits to). It is the
# competing penalty that keeps the optimizer honest (a hotter/deeper plug costs
# more). Charged on the mirror side via the p_coils recirculating bucket; the
# shared tokamak power balance is unchanged. See
# docs/account_justification/mirror_confinement_regimes.md.
p_plug: 30.0  # MW; hot-electron plug sustainment power (Hammir plug NBI/ECH anchor)

# Alpha loss-cone heating fraction [-]. Fraction of the fusion-alpha (charged
# particle) power that deposits as central-cell self-heating before scattering
# into the loss cone. A magnetic mirror loses fusion alphas out the loss cone:
# Santarius & Callen 1983 (Phys. Fluids 26, 1037), the canonical bounce-averaged
# Fokker-Planck treatment for tandem central-cell alphas, find about 50 percent
# lost by COUNT but under 25 percent by ENERGY (alphas slow down on electrons
# before scattering into the loss cone), so about 75-85 percent of the alpha
# power deposits. The lost fraction (1 - f_alpha_heat) exits the loss cone as
# directed exhaust and is routed to the axial end-loss / DEC channel. Default
# 0.80, mid of the 0.75-0.85 sourced band. See
# docs/account_justification/mirror_confinement_regimes.md.
f_alpha_heat: 0.80

# Tandem plug-to-central density ratio n_p/n_c [-]. The CAS22 coil account costs
# a TANDEM (n_plug_coils=4, Hammir class), so the central-cell confinement is set
# by the end-plug electrostatic potential e*phi = T_e * ln(n_p/n_c) (Fowler &
# Logan 1977; Frank et al. 2024 arXiv:2411.06644 eq. 18), NOT the unbounded
# simple-mirror Boltzmann value. e*phi is fixed by the plug HARDWARE (the end-plug
# coils and plug heating) and the central-cell electron temperature T_e, NOT by
# the ion temperature, so during a T_i scan the ratio e*phi/T_i FALLS as T_i rises
# and the Pastukhov enhancement weakens at high T_i: heating costs confinement, so
# the optimum settles at a cooler, genuinely DRIVEN point instead of igniting.
# Calibrated to the Realta Hammir Q>5 design point: published n_c/n_p = 0.55, so
# n_p/n_c = 1/0.55 = 1.818; at T_e = 125 keV this gives e*phi = 125*ln(1.818) =
# 74.7 keV, reproducing the published central-cell tau_c ~ 5 s and Q ~ 5.2 (not
# ignition). See docs/account_justification/mirror_confinement_regimes.md.
plug_density_ratio: 1.818

# --- Stability / validity diagnostics (Task 3; informational, not constraints) ---
# Pastukhov-Maxwellian validity threshold on collisionality (L/mfp). The Pastukhov
# loss-cone formula assumes a Maxwellian core; Rognlien & Cutler 1980 place the
# Pastukhov-vs-collisional boundary at mfp reduced by the mirror ratio of order L,
# i.e. collisionality ~ 1/R_m. Below the Maxwellian-validity floor the bare
# Pastukhov-Maxwellian assumption is stretched and confinement is over-credited;
# the diagnostic flags it. A TANDEM legitimately runs collisionless and plugged,
# so this is informational, not a hard error. Set to 1/R_m at the YAML R_m=10
# (collisionality_crit = 0.1); the bridge already centers the regime here. See
# docs/account_justification/mirror_confinement_regimes.md.
collisionality_min: 0.1  # L/mfp validity floor for the bare Pastukhov-Maxwellian core
# DCLC reference: the drift-cyclotron-loss-cone mode is loss-cone driven and grows
# more readily as the plasma spans more ion gyroradii. The Post criterion is that a
# warm-plasma stream filling the loss cone stabilises DCLC when its fraction
# exceeds about rho_i/a, i.e. roughly 1/dclc_parameter with dclc_parameter = a/rho_i
# (Post 1987; both GDT and WHAM rely on warm-plasma DCLC stabilisation). This
# reference value is the dclc_parameter above which a warm-plasma stream is
# typically required for stability; it is a documented reference, not a constraint.
dclc_a_over_rho_ref: 50.0  # a/rho_i above which warm-plasma DCLC stabilisation is typically needed.
                           # Documentation/reference-only: NOT read by any code (not a live knob).
                           # The live DCLC diagnostic computes the inline dclc_parameter = a/rho_i.

# Coil parameters (see steady_state_tokamak.yaml for the b_center / r_bore
# convention).
b_center: 12.0  # Field at coil center [T]
r_bore: 1.85  # Cross-concept schema key (required for compatibility); NOT read by
              # the mirror two-class coil branch, which derives the bores from the
              # radial build (r_bore_central) and flux conservation (r_bore_plug).
coil_material: rebco_hts  # HTS REBCO end-plug coils (LTS central-cell folded into same conductor cost basis)
coil_standoff: 0.10  # Assembly gap, vessel outer surface to central solenoid winding pack [m]
plug_standoff: 0.30  # Throat plasma to plug-coil winding pack [m]: vacuum gap + throat structure + cryostat (no blanket at the throat)

# Radial build geometry [m]
R0: 0.0  # Not used for cylinder
plasma_t: 1.5  # Plasma radius
elon: 1.0  # Not used for cylinder (circular cross-section)
chamber_length: 20.0  # Chamber length
vacuum_t: 0.10  # Plasma-to-first-wall vacuum gap [m]; explicit (matches the RadialBuild default the geometry layer was already using)
blanket_t: 0.80  # Blanket thickness (DT breeding requirement)
ht_shield_t: 0.20  # High-temperature shield
structure_t: 0.15  # Primary structure
vessel_t: 0.10  # Vacuum vessel
vac_op_pressure_pa: 0.02  # Open-field-line device: low neutral pressure to limit
# charge-exchange losses -> high pumping speed required

# Construction
construction_time_yr: 5.0  # Years (simpler geometry)

# Impurity model
wall_material: W  # Wall material: W, C, Be, Mo, SiC, Li
T_edge: 0.2  # Edge ion temperature at wall [keV] (200 eV, open field lines)
tau_ratio: 3.0  # Impurity confinement time / energy confinement time
seeded_impurities: {}  # Deliberate impurities, e.g. {Ar: 0.002}
R_w: 0.4  # Wall reflectivity for synchrotron (lower — open ends)

# Mirror coil geometry — central-cell length scaling
coil_spacing: 5.0    # Central-cell solenoid spacing [m] (Realta-class pitch)
n_plug_coils: 4      # Number of end-plug HTS coils (2 per end, HAMMIR class)

# Wall-load constraints
q_wall_max: 5.0  # Neutron wall-load cap [MW/m^2]; sizing constraint, audit-mode warning threshold
q_surface_max: 1.0  # Surface heat-flux cap on the first wall [MW/m^2] (photons + radial transport); EU-DEMO breeding-blanket steady-state limit, see docs/account_justification/wall_limits_and_fluence.md

# Mirror 0D model parameters
R_m: 10.0  # Mirror ratio B_max_throat / B_min (dimensionless)
T_i: 20.0  # Ion temperature [keV]; forward-mode 0D input (inverse mode solves T_i)
beta_max: 0.5  # MHD stability limit on midplane beta (user constraint)
use_0d_model: false  # Opt-in 0D mirror physics model (flip after anchor validation)
enforce_plasma_limits: true  # Raise OperatingPointInfeasible when beta > beta_max

# Length sizing parameters (size_from_power mode)
size_from_power: false  # Solve chamber_length from net_electric_mw
optimize_lcoe: false    # Wrap sizing with an outer LCOE minimization over f_beta
f_beta: 0.85            # Fraction of beta_max at the sizing operating point
L_min: 1.0              # Minimum chamber length for bisection [m]
L_max: 200.0            # Maximum chamber length for bisection [m]; advanced fuels (e.g. D-He3) may need a larger value at comparable power
f_beta_min: 0.3         # Lower bound for the LCOE-optimizer f_beta search
f_beta_max: 1.0         # Upper bound for the LCOE-optimizer f_beta search

# Plasma parameters for radiation calculation
n_e: 5.0e19  # Electron density [m^-3]
# Central-cell electron temperature [keV]. DECOUPLED from the plug: this is the
# CENTRAL-CELL electron temperature that sets central-cell bremsstrahlung /
# radiation (compute_p_rad, beta, stored energy), NOT the plug potential. The
# confining potential is built by the separate HOT-ELECTRON plug at T_e_plug
# (below); see plug_density_ratio above. Real advanced-fuel tandems run a hot
# plug DISTINCT from a coolable central cell, so the central cell can keep its
# electrons cool to limit bremsstrahlung while the plug stays hot. For the D-T
# REFERENCE machine the central cell genuinely runs hot: the Realta Hammir Q>5
# design point (Frank et al. 2024 arXiv:2411.06644 sec. 3.5) has a central cell at
# T_e = 125 keV (>> T_i = 45 keV), so the default stays 125 for D-T. Advanced-fuel
# configs/examples OVERRIDE this cool (e.g. 20-40 keV) to control bremsstrahlung
# while keeping T_e_plug hot. See
# docs/account_justification/mirror_confinement_regimes.md.
T_e: 125.0  # Central-cell electron temperature [keV] (radiation; Hammir D-T reference)
# Plug hot-electron temperature [keV]. Sets the Fowler-Logan confining potential
# e*phi = T_e_plug * ln(n_p/n_c) (see plug_density_ratio). The plug confines
# through the ELECTRON temperature, so a tandem must run HOT plug electrons
# (ECH-heated) for the plug to confine at all; this is set by the plug ECH
# INDEPENDENT of the central-cell fuel, which is exactly what lets an advanced
# fuel keep its central cell cool (low T_e) while the plug stays hot. At a cold
# plug (e.g. 20 keV) e*phi = 12 keV is far too shallow to plug a 20-80 keV central
# cell. The Realta Hammir Q>5 design point runs its plug hot-electron population at
# T_e = 125 keV (Frank et al. 2024 sec. 3.5); default 125 keV, anchored to Hammir.
# See docs/account_justification/mirror_confinement_regimes.md.
T_e_plug: 125.0  # Plug hot-electron temperature [keV] (Fowler-Logan potential; Hammir anchor)
Z_eff: 1.2  # Effective charge
plasma_volume: 200.0  # Plasma volume [m^3]
radiation_peaking_factor: 1.0  # Uniform profile, no emission-measure correction
B: 3.0  # Central magnetic field [T]

# Fuel burn fraction defaults (physics.py ash_neutron_split)
burn_fraction: 0.05  # Single-pass burn fraction (MFE-class)
fuel_recovery: 0.99  # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0
dhe3_fuel_ratio: 1.0  # D-He3 mix n_He3/n_D (quasineutrality dilution; 1.0 = 50:50)
pb11_fuel_ratio: 0.15  # p-B11 mix n_B/n_p (lean boron; to be calibrated)

# Blanket configuration
blanket_form: liquid_metal
blanket_fill: pbli
