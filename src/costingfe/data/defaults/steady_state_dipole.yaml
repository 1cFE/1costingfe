# Default engineering parameters for a levitated dipole (OpenStar, LDX-style).
# A superconducting field-shaping coil is levitated inside a large vacuum
# vessel; the plasma surrounds the floating coil. Steady-state (quasi-steady,
# ~90% duty cycle), high beta, ICRH-heated.
#
# Grounded in Simpson et al. 2026, "Deuterium-Tritium Levitated Dipole Fusion
# Power Plants" (arXiv 2602.20564), the OpenStar Reactor A design point
# (667 MW fusion -> 208 MWe net). These are GENERIC class defaults; a specific
# machine (e.g. OpenStar) should override plant scale and cost via the concept
# catalog, not by editing this file.
#
# FIRST-CUT MODEL CAVEATS:
#  - The concept rides the generic steady-state power balance and the torus
#    radial-build geometry as an approximation (true topology is a ring threaded
#    by plasma in a roughly spherical vessel, not a torus). Faithful capital
#    costing of the Li2O blanket / W shield / HTS coil is mass-based and belongs
#    in per-instance cost_overrides (see Simpson et al. Table 5), NOT in this
#    volume-based template.
#  - The floating coil is costed as a separate additive term in C220103
#    (lev_coil_markup + lev_coil_cryostat_cost), distinct from the stationary
#    levitation coils (n_coils in _COIL_DEFAULTS). It is a unique piece of tech:
#    23 T REBCO CICC carrying persistent current via an on-board flux pump while
#    electrically disconnected, held cold by the latent heat of NEON SLUSH at
#    24.6 K (semi-solid; ~45 min float time between docking/recool cycles).
#  - (DT) The outer ~20% of the coil is UNSHIELDED and sacrificial: it reaches
#    ~1 MW-yr/m^2 neutron fluence in ~1 year and is replaced annually, while the
#    inner ~80% lasts a decade+. This recurring per-component replacement is
#    deferred to the per-component replacement-interval enhancement (issue #13);
#    it is NOT modeled via the global single core_lifetime / replaceable_accounts
#    machinery.

p_input: 44.5       # Heating power [MW] (Reactor A; ICRH)

# Heating mix for CAS22 costing (must sum to p_input). ICRH is selected over
# ECRH for ~70% wall-plug vs 30-40% for gyrotrons (Simpson et al. 2.2.7).
p_nbi: 0.0          # NBI heating [MW]
p_ecrh: 0.0         # ECRH heating [MW]
p_icrf: 44.5        # ICRH heating [MW] (primary heating for dipole)
p_lhcd: 0.0         # LHCD heating [MW]

mn: 1.053           # Neutron energy multiplier (Li2O + W; M_blanket in analysis)
eta_p: 0.5          # Pumping efficiency
eta_couple: 1.0      # ICRF coupling; eta_pin = 0.70 x 1.0 = 0.70
eta_de: 0.0         # No direct energy conversion (closed dipole field)
f_sub: 0.03         # Subsystem power fraction
f_dec: 0.0          # No end-loss DEC (unlike a mirror)
p_coils: 3.0        # Levitation-control / stationary-coil power [MW]
p_cool: 15.0        # Cooling power [MW]
p_pump: 1.0         # Pumping power [MW]
p_trit: 10.0        # Tritium processing power [MW] (zeroed for non-DT fuels)
p_house: 4.0        # Housekeeping power [MW]
p_cryo: 1.31        # Cryogenic wall-plug power [MW] (neon slush at 24.6 K,
                    # eta_cryo ~1.25%; Reactor A Table 9)

# Coil parameters. r_bore / coil_material describe the SC magnets; the
# stationary levitation coils (n_coils, _COIL_DEFAULTS) and the levitated
# coil both scale off these. The coil-cost center field is DERIVED as
# b_center = coil_field_ratio * B (model._coil_center_field): the field at
# the geometric center of the loop (axis), NOT the peak on the conductor.
# For Simpson 2026 Reactor A the pair is b_center = 6.26 T at the loop
# center over B = 2.0 T characteristic plasma-region field (ratio 3.13);
# B_max on conductor is 23.0 T (peak-to-center 3.67), carried by the
# $/kA-m grading, not by this ratio. The kA*m formula
# NI = 2 * b_center * R / mu_0 is derived for B_center.
coil_material: rebco_hts  # OpenStar floating coil is HTS REBCO
coil_field_ratio: 3.13  # b_center / B [-] (Simpson 2026 Reactor A: 6.26 T loop-center
                        #   field over 2.0 T plasma-region field)
r_bore: 5.3          # Floating-coil winding-bore radius [m] (R_c, Table 7)

# Levitated-coil-specific cost terms (added to C220103, see cas22 DIPOLE branch)
lev_coil_markup: 8.0          # Float / energize / no-access engineering markup
lev_coil_cryostat_cost: 100.0 # Integral neon-slush cryostat + flux pump +
                              # levitation control [M$] -- FIRST-CUT placeholder

# External stationary lift coil -- a single SC coil outside the inner VV that
# provides the magnetic field-gradient force balance against the floating
# coil's gravity (Simpson et al. 2026, arXiv:2602.20564, Reactor A: the lift
# coil's field is set by force balance against the floating coil mass, NOT by
# plasma confinement, so it is much smaller than the floating coil). We
# approximate its full installed cost as a fraction of the floating coil's
# with-markup cost rather than re-running Biot-Savart on its own b_center /
# r_bore (which would conflate with the floating coil's parameters in the
# current first-cut signature). Validation: Simpson 2026 (Sec 4, "the details
# of the limiter and top magnet have not been considered ... the top magnet
# will be a small fraction of the core magnet cost and therefore will not
# affect the cost of the overall plant significantly") endorses the fraction-of-
# core-magnet approach but gives NO quantitative top-magnet specs (no field,
# current, radius, or mass in any table). So 0.10 is consistent with the paper's
# qualitative "small fraction" bound but is not numerically pinned; it is a
# documented first-cut, refine if Simpson publishes lift-coil specifications.
stationary_lift_coil_fraction: 0.10

# Radial build geometry [m] -- Simpson 2026 Reactor A inner vacuum vessel at
# ~20.6 m radius, thin Inconel membrane (no coil Lorentz forces, no disruption
# EM loads -- outer concrete shell handles atmospheric pressure). Plasma fills
# the volume out to a thin Li2O breeding shell mounted inside the inner VV.
#
# Volumes are computed under DIPOLE's spherical-shell branch in geometry.py:
# plasma fills 0 .. plasma_t, then blanket, then (zero) shield/structure/gap,
# then a thin vessel membrane. Total outer radius (vessel_or) ~= 20.6 m.
R0: 0.0              # Not used for spherical dispatch
plasma_t: 20.27      # Plasma fills the chamber out to the Li2O blanket shell
elon: 1.0
blanket_t: 0.33      # Thin Li2O breeding shell at large radius
ht_shield_t: 0.0     # No dedicated HT shield (blanket + plasma volume attenuate)
structure_t: 0.0     # No primary structure inside the inner VV
vessel_t: 0.008      # Thin Inconel membrane (~8 mm); no Lorentz/disruption loads

# Construction
construction_time_yr: 6.0  # Years

# Impurity model
wall_material: W       # Wall material: W, C, Be, Mo, SiC, Li
T_edge: 0.8            # Edge ion temperature at wall [keV] (800 eV upper bound)
tau_ratio: 3.0         # Impurity confinement time / energy confinement time
seeded_impurities: {}  # Deliberate impurities, e.g. {Ar: 0.002}
R_w: 0.4               # Wall reflectivity for synchrotron

# Plasma parameters for radiation calculation (Reactor A)
n_e: 1.95e+20       # Electron density [m^-3]
T_e: 10.9           # Electron temperature [keV] (peak ion temp; lower than tokamak)
Z_eff: 1.5          # Effective charge
plasma_volume: 13600.0 # Geometric plasma volume [m^3] (Simpson 2026 Reactor A,
                       #   Table 6). No longer a radiation fudge: the peaking
                       #   factor below carries the profile correction.
radiation_peaking_factor: 0.05 # Hasegawa-Mauel profile (n prop R^-4, T prop R^-8/3);
                               #   the hot/dense radiating core is about 5% of
                               #   the geometric volume (Simpson 2026 sec 2.1.1).
B: 2.0              # Characteristic plasma-region field [T] (falls off from coil)

# Fuel burn fraction defaults (physics.py ash_neutron_split)
burn_fraction: 0.05      # Single-pass burn fraction (MFE-class)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration: Li2O solid ceramic, natural lithium (TBR 1.1 via W
# neutron multiplication; no Li-6 enrichment). Li2O carries its own
# blanket_unit_cost_li2o in the C220101 branch (structure only, decoupled from
# the fuel key); the Li2O fill inventory is priced in CAS27. Faithful capital
# costing of this large thin shell is mass-based (Simpson et al. Table 5) and
# belongs in per-instance cost_overrides, not this volume-based template.
blanket_form: solid_breeder
blanket_fill: li2o
