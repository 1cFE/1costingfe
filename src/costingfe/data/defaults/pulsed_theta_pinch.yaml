# Default engineering parameters for Theta Pinch
q_eng: 3.0               # Engineering gain target (P_et / P_recirc)
# Linear pulsed magnetic compression with inductive energy recovery.
# Open-ended geometry, copper coils, no manufactured targets.
# Classic DEC candidate (Oliphant, Ribe & Coultas 1973).

# Rep-rate shot design point: THETA_PINCH is a dormant concept with no
# modern developer; all numbers below are 1958-65 Los Alamos Scylla-series
# experiments, illustrative only, NOT a modern design point.
# e_driver_mj SOURCED: Quinn, Little, Ribe, Sawyer, "Stability, Heating and
# End Loss of a 3.5-Megajoule Theta Pinch (Scylla IV)," LASL LA-DC-7039 /
# CONF-650935-2 (1965) -- capacitor-bank energy is in the report title
# itself.
# yield_per_shot_mj and max_f_rep are ARBITRARY / ILLUSTRATIVE, NOT real or
# sourced values. Scylla IV never achieved meaningful fusion gain: only
# diagnostic-level neutron counts are documented ("billions of D-D fusion
# reactions per pulse" at about 80 million K), which converts to about
# 1e-10 MJ/shot (gain about 1e-10) -- negligible, and that conversion is
# unpublished back-of-envelope arithmetic, not a primary-source joule
# figure. No primary source gives a Scylla shot cadence; MJ-class 1960s
# banks with HV recharge, crowbar reset, gas refill, and manual diagnostics
# were effectively single-shot / order-minutes between shots. Pinned here
# to yield_per_shot_mj = 35 (an illustrative gain G=10 on the 3.5 MJ bank)
# and max_f_rep = 1 (illustrative placeholder; no cadence documented) so
# the concept has non-zero, finite modeling inputs. See docs/physics/
# concept_power_scaling.md "Rep-rate shot design points".
e_driver_mj: 3.5           # MJ/shot — Scylla IV capacitor-bank energy (SOURCED, historical)
yield_per_shot_mj: 35.0    # MJ/shot — ARBITRARY/ILLUSTRATIVE (gain G=10 placeholder; Scylla achieved negligible real yield)
max_f_rep: 1.0             # Hz — ARBITRARY/ILLUSTRATIVE (no cadence documented for Scylla)

# Pulsed parameters
f_rep: 1.0               # Repetition rate [Hz]
pulsed_conversion: inductive_dec
f_rad: 0.05
eta_pin: 0.93            # Pulsed power wall-plug efficiency
driver_recovery_frac: 0.0  # Electrical driver, no mechanical recovery (see MAG_TARGET's anchored value)
eta_dec: 0.70            # Conservative DEC efficiency (Oliphant 1973 baseline)
f_pdv: 0.78              # PdV fraction (moderate expansion ratio ~10)

mn: 1.0              # No breeding blanket
f_sub: 0.03
p_pump: 0.0          # No thermal cycle pumping
p_trit: 0.5          # Tritium monitoring [MW]
p_house: 2.0         # Housekeeping [MW]
p_cryo: 0.0          # Copper coils
p_target: 0.0        # No manufactured targets
target_unit_cost: 0.0    # $/shot — in-situ magnetic compression of gas-fill plasma, no fabricated target. See CAS80_target_consumables.md
p_coils: 0.5         # Compression coils average power [MW]

# Coil parameters — copper pulsed coils. b_center = peak field at the loop
# center during compression (NOT field on the conductor surface).
coil_material: copper
b_center: 8.0        # Field at coil center during peak compression [T]
r_bore: 0.4          # Effective winding bore [m]

# Radial build geometry [m] (cylindrical)
R0: 0.0
plasma_t: 0.3        # Plasma radius [m]
blanket_t: 0.05      # Thin first wall
ht_shield_t: 0.05    # Minimal shielding
structure_t: 0.10
vessel_t: 0.10

construction_time_yr: 4.0

# Fuel burn fraction defaults
burn_fraction: 0.05      # Single-pass burn fraction (theta-pinch; faster expansion than Z-pinch, MFE-bound)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration (aneutronic-oriented concept: no breeding blanket)
blanket_form: none
blanket_fill: none
