# Default engineering parameters for Theta Pinch
q_eng: 3.0               # Engineering gain target (P_et / P_recirc)
# Toroidal high-beta theta pinch: pulsed axial-field magnetic compression of a
# DT plasma, bent into a closed torus to eliminate axial end losses. NOT a
# tokamak -- there is no ohmic-driven toroidal plasma current; confinement is
# pulsed high-beta compression by external theta-current coils. Copper
# compression coils, inductive energy-transfer-and-storage (ETS), DT breeding
# blanket, thermal (Rankine) conversion.

# Rep-rate shot design point (SOURCED, reactor-class): the Los Alamos
# Reference Theta-Pinch Reactor (RTPR), Burnett, Ellis, Oliphant, Ribe,
# "A Reference Theta Pinch Reactor (RTPR)," LASL LA-5121-MS (1972); engineering
# study Krakowski, Ribe, Coultas, Hatch, LA-5336/ANL-8019 (1974). RTPR is a
# 350 m toroidal machine; LA-5121-MS Table IV states energies per metre,
# totalled here x 350 m. The compression field is a REACTIVE store (an LC
# ringdown), so the three per-pulse driver energies decouple:
#   - e_driver_mj = energy DELIVERED to the plasma (W_p)i = 3.41 MJ/m x 350
#     ~ 1190 MJ/pulse; sets fusion gain q_sci = yield/e_driver ~ 24.
#   - e_store_mj = GROSS switched compression-field energy W_BO = 315 MJ/m
#     x 350 ~ 110250 MJ/pulse -> C220107 ETS/cap-bank capital. ~98% is
#     reactively recovered each cycle (the theta-pinch cost-killer: huge store,
#     tiny net consumption).
#   - e_recirc_mj = net consumed drive Wi = 5.93 MJ/m x 350 ~ 2076 MJ/pulse
#     -> recirculating grid draw.
#   - yield_per_shot_mj = bare DT fusion 82.3 MJ/m x 350 ~ 28800 MJ/pulse
#     (blanket energy multiplication is handled by mn, not double-counted here).
#   - max_f_rep = 0.1 Hz (100 ms burn / 10 s cycle, Table IV).
# RTPR reference point: 1800 MWe net, 3600 MWth, plant gain Q ~ 17.5. See
# docs/physics/concept_power_scaling.md "Rep-rate shot design points".
e_driver_mj: 1190.0        # MJ/shot — energy delivered to plasma (W_p)i (SOURCED, RTPR LA-5121-MS)
yield_per_shot_mj: 28800.0 # MJ/shot — bare DT fusion yield (SOURCED, RTPR LA-5121-MS)
max_f_rep: 0.1             # Hz — 100 ms burn / 10 s cycle (SOURCED, RTPR LA-5121-MS)
e_store_mj: 110250.0       # MJ/shot — GROSS switched field energy W_BO (-> C220107 ETS store)
e_recirc_mj: 2076.0        # MJ/shot — net consumed drive Wi (~98% reactively recovered)

# Pulsed parameters
f_rep: 0.1               # Repetition rate [Hz]
pulsed_conversion: recovered_compression
f_rad: 0.05              # Radiation fraction
mn: 1.1                  # Neutron energy multiplier (DT Li breeding blanket)
eta_pin: 0.93            # ETS wall-plug efficiency (default-fallback only; e_store/e_recirc are explicit)
# driver_recovery_frac = 0.0: all energy DELIVERED to the plasma (e_driver_mj)
# thermalises. The reactive field recovery is represented by the e_store_mj /
# e_recirc_mj split above (gross store vs net consumption), NOT by this
# fraction, which on the recovered_compression path governs only how much of
# the delivered energy dissipates as heat. See concept_power_scaling.md.
driver_recovery_frac: 0.0

f_sub: 0.03          # Subsystem power fraction
p_pump: 1.0          # Coolant pumping power [MW] (thermal cycle)
p_trit: 10.0         # Tritium processing power [MW] (DT breeding)
p_house: 4.0         # Housekeeping power [MW]
p_cryo: 0.0          # Copper coils (no cryogenics)
p_target: 0.0        # No manufactured targets (in-situ gas-fill compression)
target_unit_cost: 0.0    # $/shot — in-situ magnetic compression of gas-fill plasma, no fabricated target. See CAS80_target_consumables.md
p_coils: 0.5         # Compression-coil average power [MW]

# Coil parameters — copper theta-compression coils. b_center = peak axial
# field at the loop center during compression (NOT field on the conductor
# surface).
coil_material: copper
b_center: 11.0       # Peak compression field [T] (RTPR reference, LA-5336)
r_bore: 0.5          # Effective winding bore [m]

# Radial build geometry [m]. Simplified representation: RTPR is a 350 m torus,
# but for costing it is treated as an unrolled long solenoid of compression
# coils (R0=0). Compression-coil cost scales with total coil length / stored
# energy whether the solenoid is straight or closed into a ring, and this
# avoids falsely routing a theta pinch through tokamak (TF/PF/CS) magnet
# costing. See docs/physics/concept_power_scaling.md.
R0: 0.0
plasma_t: 0.5        # Plasma / first-wall radius [m] (RTPR)
blanket_t: 0.60      # DT breeding blanket (liquid Li)
ht_shield_t: 0.20    # High-temperature shield
structure_t: 0.15    # Primary structure
vessel_t: 0.10       # Vacuum vessel

construction_time_yr: 4.0

# Fuel burn fraction defaults
burn_fraction: 0.05      # Single-pass burn fraction (theta-pinch; faster expansion than Z-pinch, MFE-bound)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration (DT breeding, liquid-lithium, per RTPR)
blanket_form: liquid_metal
blanket_fill: li

# Aneutronic first-wall hardware class (read only when blanket_form is none,
# i.e. p-B11/D-He3 fuel normalization): panel = actively-cooled W/steel wall
# (<= 2 MW/m^2 steady), hhf = divertor-grade monoblock wall (<= 10 MW/m^2),
# beam_dump = bare-CuCrZr beam-dump wall (<= 20 MW/m^2 through-wall).
# See costing_constants.yaml fw_unit_cost / fw_class_q_limit.
fw_class: panel
