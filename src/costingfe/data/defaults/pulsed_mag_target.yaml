# Default engineering parameters for MIF magnetized target fusion
q_eng: 3.0               # Engineering gain target (P_et / P_recirc)

# Rep-rate shot design point (SOURCED, reactor-class): General Fusion's
# "Design Point - 150 MWe" reactor Sankey (NOT the LM26 breakeven experiment)
# in Krotez, Segas, Khalzov, Suponitsky, "Conceptual Design of a Magnetized
# Target Fusion Power Plant," IEEE SOFE 2023 paper E-267. e_driver_mj = the
# 755 MJ kinetic-energy arrow into the liquid-lithium liner; yield_per_shot_mj
# = the "Fusion 780 MJ" node (NOT the 886 MJ "Converted Yield" arrow, which
# adds directly-converted liner-vaporization energy); max_f_rep = the poster's
# stated 1 Hz -> 150 MWe. Fusion gain 780/755 ~ 1.03 is the real reactor
# point: liquid-liner MTF closes through 85% mechanical recovery + 40% thermal,
# not high gain. See docs/physics/concept_power_scaling.md "Rep-rate shot
# design points".
e_driver_mj: 755.0        # MJ/shot — liner KE delivered (-> gain q_sci + C220104 piston capital)
yield_per_shot_mj: 780.0  # MJ/shot — fusion yield ("Fusion 780 MJ" node)
max_f_rep: 1.0            # Hz — commercial design ceiling
# Recovered-compression split (SOURCED from the same E-267 Sankey): the liner
# KE is mostly recovered mechanically, so the electrical grid draw and the
# cap-bank store are separate, smaller energies than e_driver_mj.
e_store_mj: 173.0        # MJ/shot — plasma-injector pulsed-power store (-> C220107); E-267 "Pulsed Power Supply" node
e_recirc_mj: 195.0       # MJ/shot — net electrical resupply (pulsed power ~173 + gas compressor ~22 per E-267)

# driver_recovery_frac (SOURCED): fraction of the liner KE (e_driver_mj)
# mechanically recovered each shot (liner rebound / working-fluid recovery)
# rather than dissipated as heat. The E-267 poster states it directly as a
# constant: "Kinetic Energy Dissipation 1 - eta_mech = 15%", i.e. 85% recovery.
# On the recovered_compression path this sets the thermal deposition only:
# (1 - 0.85) x 755 MJ dissipates into the blanket heat pool. The grid draw is
# the separate e_recirc_mj above, NOT e_driver/eta_pin (the single-pass
# formula that over-charged this mechanical driver). See
# docs/physics/concept_power_scaling.md "Rep-rate shot design points".
driver_recovery_frac: 0.85

f_rep: 1.0               # Repetition rate [Hz]
pulsed_conversion: recovered_compression
f_rad: 0.10
mn: 1.1              # Neutron energy multiplier
eta_pin: 0.30        # Pulsed power wall-plug efficiency
f_sub: 0.03          # Subsystem power fraction
p_pump: 1.0          # Pumping power [MW]
p_trit: 10.0         # Tritium processing power [MW]
p_house: 4.0         # Housekeeping power [MW]
p_cryo: 0.0          # Cryogenic power [MW] (no superconducting confinement magnets)
p_target: 0.0        # No target factory by default: the generic MTF concept (General Fusion / Helion-class) forms the magnetized target in-situ and recycles its liquid-metal liner. A pellet-fed MTF (e.g. NearStar) sets p_target and target_unit_cost in its own concept config.
target_unit_cost: 0.0    # $/shot — in-situ formation, recycled liquid liner: no manufactured target consumable. Solid-liner MTF would set ~2-15. See CAS80_target_consumables.md
p_coils: 0.0         # No plant-scale confinement magnets; seed field is in the CT injector (General Fusion) or the pellet (NearStar)

# Radial build geometry [m] (spherical chamber)
R0: 0.0          # Not used for sphere
plasma_t: 3.0        # Chamber radius
blanket_t: 0.80      # Blanket thickness (DT breeding requirement)
ht_shield_t: 0.20    # High-temperature shield
structure_t: 0.15    # Primary structure
vessel_t: 0.10       # Vacuum vessel

# Construction
construction_time_yr: 4.0  # Years (compact, simple magnets)

# Fuel burn fraction defaults (physics.py ash_neutron_split)
burn_fraction: 0.10      # Single-pass burn fraction (MTF/MIF concept literature)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration
blanket_form: liquid_metal
blanket_fill: pbli

# Aneutronic first-wall hardware class (read only when blanket_form is none,
# i.e. p-B11/D-He3 fuel normalization): panel = actively-cooled W/steel wall
# (<= 2 MW/m^2 steady), hhf = divertor-grade monoblock wall (<= 10 MW/m^2).
# See costing_constants.yaml fw_unit_cost / fw_class_q_limit.
fw_class: panel
