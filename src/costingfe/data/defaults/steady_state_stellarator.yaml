# Default engineering parameters for MFE stellarator
# Stellarators: steady-state, no disruptions, complex coils

p_input: 30.0       # Heating power [MW] (less than tokamak — steady-state)

# Heating mix for CAS22 costing (must sum to p_input)
# Stellarators use ECRH (no current drive needed)
p_nbi: 0.0          # NBI heating [MW]
p_ecrh: 30.0        # ECRH heating [MW] (primary heating for stellarator)
p_icrf: 0.0         # ICRF heating [MW]
p_lhcd: 0.0         # LHCD heating [MW]

mn: 1.1             # Neutron energy multiplier
eta_p: 0.5          # Pumping efficiency
eta_couple: 1.0      # ECRH coupling; eta_pin = 0.50 x 1.0 = 0.50
eta_de: 0.85        # DEC efficiency
f_sub: 0.03         # Subsystem power fraction
f_dec: 0.0          # DEC fraction
p_coils: 3.0        # Coil power [MW] (complex 3D coils)
p_cool: 15.0        # Cooling power [MW]
p_pump: 1.0         # Pumping power [MW]
p_trit: 10.0        # Tritium processing power [MW]
p_house: 4.0        # Housekeeping power [MW]
p_cryo: 0.8         # Cryogenic power [MW]

# Coil parameters (see steady_state_tokamak.yaml for the b_center / r_bore
# convention).
b_center: 18.0       # Field at coil center [T] (HTS REBCO enables 15-20T peak)
r_bore: 1.85         # Effective winding bore radius [m]

# Radial build geometry [m]
R0: 5.5          # Major radius R0
plasma_t: 1.8        # Minor radius a
elon: 1.0            # Near-circular cross-section
blanket_t: 0.80      # Blanket thickness (same TBR requirement as tokamak)
ht_shield_t: 0.20    # High-temperature shield
structure_t: 0.15    # Primary structure
vessel_t: 0.10       # Vacuum vessel
vac_op_pressure_pa: 3.0  # Island/divertor plenum pressure [Pa], tokamak-like

# Construction
construction_time_yr: 8.0  # Years (complex 3D coils, harder assembly)

# Impurity model
wall_material: W       # Wall material: W, C, Be, Mo, SiC, Li
T_edge: 0.05           # Edge ion temperature at wall [keV] (50 eV, island divertor)
tau_ratio: 3.0         # Impurity confinement time / energy confinement time
seeded_impurities: {}  # Deliberate impurities, e.g. {Ar: 0.002}
R_w: 0.6               # Wall reflectivity for synchrotron (metallic walls 0.6-0.8)

# Plasma parameters for radiation calculation
n_e: 1.0e+20        # Electron density [m^-3]
T_e: 12.0           # Electron temperature [keV]
Z_eff: 1.3          # Effective charge
plasma_volume: 800.0 # Plasma volume [m^3] (larger than tokamak)
B: 5.0              # Magnetic field [T]

# Fuel burn fraction defaults (physics.py ash_neutron_split)
burn_fraction: 0.05      # Single-pass burn fraction (MFE-class)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration
blanket_form: liquid_metal
blanket_fill: pbli
