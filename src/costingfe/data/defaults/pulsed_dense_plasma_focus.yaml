# Default engineering parameters for Dense Plasma Focus
q_eng: 3.0               # Engineering gain target (P_et / P_recirc)
# Compact pulsed device with self-organizing plasma pinch.
# Very high density, short confinement, low energy per pulse.
# No manufactured targets — plasma forms from gas fill.

# Module-replication sizing: per-module design net electric power. LPP Fusion
# states larger plants are "formed by simply stacking" 5 MW units; size_from_power
# solves n_mod = ceil(target / module_net_mwe). See
# docs/physics/concept_power_scaling.md.
module_net_mwe: 5.0      # 5 MWe per unit (LPP Fusion, 200 Hz)

# Pulsed parameters
f_rep: 5.0               # Repetition rate [Hz]
pulsed_conversion: thermal
f_rad: 0.15              # High radiation fraction (dense, hot)
eta_pin: 0.20            # Pulsed power wall-plug efficiency
# Direct charged-particle conversion (thermal-mode partial DEC). LPP Fusion's
# Focus Fusion design converts the emitted ion beam directly in a decelerator
# (about 80% efficiency); for aneutronic p-B11 nearly all fusion power is
# charged, so f_dec is near unity (the aneutronic DEC limit). NOTE: f_dec
# captures only charged-particle power; LPP's separate X-ray photoelectric
# recovery of the radiated power is not modeled here (that fraction still
# thermalizes). DPF is not an inductive compress-expand concept, so the
# inductive-DEC parameters (eta_dec, f_pdv) do not apply and are omitted.
f_dec: 0.90             # Fraction of non-radiated charged-particle power direct-converted
eta_de: 0.80            # Ion-beam decelerator conversion efficiency (LPP)

mn: 1.1              # Neutron energy multiplier
f_sub: 0.03
p_pump: 0.5          # Pumping power [MW]
p_trit: 5.0          # Tritium processing [MW]
p_house: 2.0         # Housekeeping [MW]
p_cryo: 0.0          # No cryogenics
p_target: 0.0        # No manufactured targets
target_unit_cost: 0.0    # $/shot — plasma forms from gas fill, no fabricated target. See CAS80_target_consumables.md
p_coils: 0.0         # No external field coils

# Radial build geometry [m] (cylindrical, compact)
R0: 0.0
plasma_t: 1.0        # Chamber radius
blanket_t: 0.05      # Thin first wall only (no breeding blanket; aneutronic)
ht_shield_t: 0.20    # Shield
structure_t: 0.15
vessel_t: 0.10

construction_time_yr: 4.0

# Fuel burn fraction defaults
burn_fraction: 0.01      # Single-pass burn fraction (DPF; sub-microsecond pinch lifetime limits dwell)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration (aneutronic-oriented concept: no breeding blanket)
blanket_form: none
blanket_fill: none
