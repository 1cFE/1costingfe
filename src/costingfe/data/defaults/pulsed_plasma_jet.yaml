# Default engineering parameters for MIF plasma jet driven fusion
q_eng: 3.0               # Engineering gain target (P_et / P_recirc)

# Rep-rate shot design point (SOURCED): Langendorf & Hsu, "Semi-analytic
# model of plasma-jet-driven magneto-inertial fusion," Phys. Plasmas 24,
# 032704 (2017), arXiv:1612.07368, "case2" design point (Sec. III.C):
# E_tot = 31.3 MJ, gain = 23.5, f_rep = 1 Hz. yield_per_shot_mj = 31.3 x 23.5
# = 735.6 MJ (rounded 736), corroborated by Thio & Witherspoon 2018
# ("~500 MJ per pulse"). No reactor-scale machine has been built; these are
# peer-reviewed design-point/simulation values. See docs/physics/
# concept_power_scaling.md "Rep-rate shot design points".
e_driver_mj: 31.3         # MJ/shot — liner + target-formation input energy
yield_per_shot_mj: 736.0  # MJ/shot — fusion yield (= 31.3 x gain 23.5)
max_f_rep: 1.0            # Hz — design baseline (1-2 Hz cited as feasible upper bound)

f_rep: 1.0               # Repetition rate [Hz]
pulsed_conversion: thermal
f_rad: 0.10
mn: 1.1              # Neutron energy multiplier
eta_pin: 0.25        # Plasma jet wall-plug efficiency
f_sub: 0.03          # Subsystem power fraction
p_pump: 1.0          # Pumping power [MW]
p_trit: 10.0         # Tritium processing power [MW]
p_house: 4.0         # Housekeeping power [MW]
p_cryo: 0.0          # Cryogenic power [MW] (no superconducting confinement magnets)
p_target: 0.0        # No target factory: the imploding liner is plasma formed in-situ by the standoff plasma guns (no fabricated target, "produces no hardware debris" — Hsu/Thio PJMIF)
target_unit_cost: 0.0    # $/shot — no manufactured target consumable (plasma liner; working gas is sub-cent, carried as O&M not a per-shot part). See CAS80_target_consumables.md
p_coils: 0.0         # No plant-scale confinement magnets (merging plasma guns)

# Radial build geometry [m] (spherical chamber)
R0: 0.0          # Not used for sphere
plasma_t: 3.5        # Chamber radius
blanket_t: 0.80      # Blanket thickness (DT breeding requirement)
ht_shield_t: 0.20    # High-temperature shield
structure_t: 0.15    # Primary structure
vessel_t: 0.10       # Vacuum vessel

# Construction
construction_time_yr: 4.0  # Years (compact pulsed system)

# Fuel burn fraction defaults (physics.py ash_neutron_split)
burn_fraction: 0.10      # Single-pass burn fraction (PJMIF MHD simulations, Witherspoon, Hsu)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration
blanket_form: liquid_metal
blanket_fill: pbli
