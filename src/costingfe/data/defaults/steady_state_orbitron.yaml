# Default engineering parameters for Orbitron (Avalanche Energy)
# Crossed E×B electrostatic confinement. Ions in stable orbits at
# fusion energies. Non-thermal plasma (suppressed bremsstrahlung).
# Compact device, modular, steady-state.
# Primary fuel: p-B11 (aneutronic, all charged products).

# Per-module kWe-class design point. Avalanche's Orbitron is a 1-100 kWe
# machine built as single cells of 5 kW to 100s of kW; defaults anchor on the
# concrete 5 kWe module (their "power pack"), reached at grid scale via n_mod
# (a 1 GWe plant is ~200,000 modules). Loads are order-of-magnitude estimates
# for a 5 kWe module pending BOM-class calibration; override at the spec level
# to model a larger single-cell variant.

# Module-replication sizing: per-module design net electric power. size_from_power
# solves n_mod = ceil(target / module_net_mwe). See
# docs/physics/concept_power_scaling.md.
module_net_mwe: 0.005    # 5 kWe per cell (Avalanche Energy)
p_input: 0.0025      # 2.5 kW E-field power supply [MW]

# Heating mix — no conventional heating systems.
# p_input represents electrostatic power supply; map to NBI as proxy
# for CAS22 costing (override C220104 for actual device).
p_nbi: 0.0
p_ecrh: 0.0
p_icrf: 0.0
p_lhcd: 0.0

mn: 1.0              # No blanket multiplication (aneutronic target)
eta_p: 0.5           # Pumping efficiency
eta_pin: 0.80        # E-field power supply wall-plug efficiency
eta_de: 0.70         # Electrostatic DEC efficiency on escaping alphas
f_sub: 0.03          # Subsystem power fraction
f_dec: 0.90          # Most charged products escape radially to DEC
p_coils: 0.0001      # 0.1 kW small permanent / normal-conducting magnets [MW]
p_cool: 0.0002       # 0.2 kW thermal management [MW]
p_pump: 0.00005      # 0.05 kW vacuum pumping [MW]
p_trit: 0.0          # No tritium (p-B11)
p_house: 0.0001      # 0.1 kW housekeeping (controls, sensors) [MW]
p_cryo: 0.0          # No cryogenics (permanent or normal-conducting magnets)

# Coil parameters — simple magnets. b_center = field at the loop center
# (NOT peak-on-conductor); see steady_state_tokamak.yaml convention.
coil_material: copper
b_center: 2.0        # Field at coil center [T]
r_bore: 0.3          # Effective winding bore [m]

# Radial build geometry [m] (cylindrical, compact)
R0: 0.0
plasma_t: 0.3        # Plasma radius [m] (compact device)
elon: 1.0
chamber_length: 2.0  # Short device
blanket_t: 0.02      # Minimal (aneutronic)
ht_shield_t: 0.02    # Minimal
structure_t: 0.10
vessel_t: 0.05

# Construction
construction_time_yr: 3.0  # Factory-built, compact

# Plasma parameters for radiation calculation
# Non-thermal: set low T_e to suppress bremsstrahlung in the model.
# Real Orbitron has beam-like ions, not thermal — this is an approximation.
n_e: 1.0e+18         # Low density [m^-3]
T_e: 5.0             # Effective electron temperature [keV]
Z_eff: 1.5           # Effective charge
plasma_volume: 0.5   # Small volume [m^3]
radiation_peaking_factor: 1.0   # Uniform profile, no emission-measure correction
B: 1.0               # Central field [T]

# Impurity model
wall_material: W
T_edge: 0.05
tau_ratio: 3.0
seeded_impurities: {}
R_w: 0.3

# Fuel burn fraction defaults
burn_fraction: 0.05      # Single-pass burn fraction (MFE-class placeholder)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration (aneutronic-oriented concept: no breeding blanket)
blanket_form: none
blanket_fill: none
