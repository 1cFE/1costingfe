# Default engineering parameters for IFE laser fusion
q_eng: 4.0               # Engineering gain target (P_et / P_recirc)
# Source: pyFECONs CATF IFE configuration

# Rep-rate shot design point (SOURCED): Ditmire, Roth, et al., "Focused
# Energy, A New Approach Towards Inertial Fusion Energy," J. Fusion Energy
# 42:27 (2023) — commercial power-plant design point (direct-drive proton
# fast ignition, about 1 GWe class). "roughly a laser energy of 2.5 MJ per
# pulse operating at 10 Hz"; yield_per_shot_mj = 2.5 x design target gain
# G=100 = 250 MJ (cross-checked against the paper's power-cycle block
# diagram, about 2523 MW fusion / 10 Hz = about 252 MJ/shot). max_f_rep
# corrected from an unsupported 16 Hz to the paper's stated 10 Hz (Marvel
# Fusion also cites 10 Hz for their DPSSL class). See docs/physics/
# concept_power_scaling.md "Rep-rate shot design points".
e_driver_mj: 2.5          # MJ/shot — laser driver energy
yield_per_shot_mj: 250.0  # MJ/shot — fusion yield (= 2.5 x design-target gain G100)
max_f_rep: 10.0           # Hz — commercial design ceiling

# Target-yield sizing: COMPANY sets driver energy + engineering ceiling; PHYSICS
# sets the gain from the burn-up fraction below: yield = burn_fraction * m * e_DT,
# m = fuel_mass_mg_per_mj * e_driver. Laser burn_fraction 0.25 (reactor direct-
# drive; rhoR ~ 2.0 g/cm^2) is the HIGHEST of the pulsed-IFE set (high-convergence
# burn) -> higher gain per driver joule than magnetic drive. No per-concept gain
# anchor. Indirect-drive concepts (26/30) carry their own lower burn_fraction.
e_driver_min_mj: 1.5    # MJ — lower driver bound
e_driver_max_mj: 12.0   # MJ — engineering driver ceiling (company/tech)

f_rep: 10.0              # Repetition rate [Hz]
pulsed_conversion: thermal
laser_driver_type: dpssl   # dpssl | krf | nd_glass (selects C220104 $/MJ + CAS72 replacement)
f_rad: 0.10
# eta_pin (wall-plug efficiency) is NOT set here -- like eta_th it is resolved
# from laser_driver_type via eta_source_* (DPSSL 0.15 / KrF 0.10 / fiber 0.20 /
# Nd:glass 0.02). Override eta_pin explicitly only to model an off-nominal driver.
driver_recovery_frac: 0.0  # Electrical driver, no mechanical recovery (see MAG_TARGET's anchored value)
mn: 1.1              # Neutron energy multiplier
f_sub: 0.03          # Subsystem power fraction
p_pump: 1.0          # Pumping power [MW]
p_trit: 10.0         # Tritium processing power [MW]
p_house: 4.0         # Housekeeping power [MW]
p_cryo: 0.5          # Cryogenic power [MW]
p_target: 1.0        # Target factory power [MW]
target_unit_cost: 0.50   # $/shot — bottom-up materials+opex / yield (capital now in CAS22.01.08, not double-banked here); dispose default; range 0.27-1.28. See CAS80_target_consumables.md
# Target factory (CAS22.01.08), three-term build-up; design total ~730 M$ at 10 Hz, 3.06 GW_fus (range 434-1564). See CAS80_target_consumables.md
target_factory_capex_fixed: 290.0      # M$ — cleanroom + tritium-confinement shell + base line (rep-independent)
target_factory_capex_per_hz: 33.0      # M$/Hz — precision production lines (CVD/fill/layer/assembly/metrology), scale with throughput
target_factory_capex_per_gwfus: 36.0   # M$/GW_fus — cryo + recovery + waste handling, scale with mass-energy flow (carries J/shot dependence)

# Radial build geometry [m] (spherical chamber)
R0: 0.0          # Not used for sphere
plasma_t: 4.0        # Chamber radius
blanket_t: 0.80      # Blanket thickness
ht_shield_t: 0.25    # High-temperature shield
structure_t: 0.15    # Primary structure
vessel_t: 0.10       # Vacuum vessel

# Construction
construction_time_yr: 5.0  # Years (no magnets, simpler)

# Fuel burn fraction defaults (physics.py ash_neutron_split)
burn_fraction: 0.25      # Single-pass burn fraction (inertial; reactor-target value, NIF shots get 2-4%)
# Size-dependent gain curve (ON by default for laser): phi = rhoR/(rhoR+H_B),
# rhoR = rhoR_ref * (E_on_target / e_rhoR_ref)^(1/3). Anchor 2.0 g/cm^2 @ 2.5 MJ
# reproduces burn_fraction 0.25 (gain 94x) at the reference; gain rises ~E^1/3
# with driver energy and saturates toward the phi=1 ceiling (374x direct DT).
# Sourced: Hawker 2020 eqs 2.19-2.20; NRL/Obenschain + Xcimer/Thomas 2024. Set
# rhoR_ref_g_cm2: 0 to revert to a flat burn_fraction. See defaults.py / physics.
rhoR_ref_g_cm2: 2.0      # g/cm^2 areal density at the reference energy
e_rhoR_ref_mj: 2.5       # MJ on target — reference energy for the rhoR anchor
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration
blanket_form: liquid_metal
blanket_fill: pbli
