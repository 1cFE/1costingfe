# Default engineering parameters for pulsed FRC (Helion-like)
q_eng: 3.0               # Engineering gain target (P_et / P_recirc)
# Colliding field-reversed configuration with inductive DEC.
# Copper pulsed coils, no superconductors, no cryogenics.
# In-situ plasmoid formation (no manufactured targets).

# Rep-rate shot design point (reactor-target-anchored):
# e_driver_mj SOURCED: Helion "Polaris" (7th prototype) capacitor-bank
# energy, stated "50+ MJ" on Helion's Polaris page, corroborated by the
# Helion blog and Scientific American.
# max_f_rep is THIRD-PARTY, not a Helion spec: Helion publishes no numeric
# plant rep-rate. 1 Hz traces to the Polaris/NRC filing (ML21026A315) and
# IEEE Spectrum; Helion's roadmap language points from 1 Hz toward ~10 Hz,
# so the honest range is 1-10 Hz. 1 Hz is the conservative working value
# (Trenta ran about 1 pulse/10 min; no source supports a 10 Hz plant today).
# yield_per_shot_mj is REACTOR-TARGET-ANCHORED (derived, not disclosed):
# Helion publishes no per-shot fusion yield (checked Helion, Wikipedia,
# Scientific American, TechCrunch, IEEE Spectrum, a 2026 Helion arXiv
# instrument paper; VENTI's 2018 D-D neutron yield ~0.1 J/pulse is ~8 orders
# below the driver and unrepresentative of the D-He3 commercial design).
# Pinned to 101.4 MJ/shot: the value of p_fus (at f_rep=1, so
# yield_per_shot_mj = p_fus in MJ) for which this YAML's own
# pulsed_dec_forward (inductive_dec) DEC params (eta_pin, eta_dec, f_pdv,
# f_rad, p_coils, etc., eta_th=0 default for INDUCTIVE_DEC) reproduce
# p_net = 50 MW at e_driver_mj=50, f_rep=1 -- i.e. model-consistent with
# Helion's SOURCED commercial-plant target of >=50 MWe net (Helion/Microsoft
# PPA, 2023). Same anchored-to-a-sourced-plant-number character as
# MAG_TARGET's recovery, not a physical yield; do not cite as a disclosed
# figure. See docs/physics/concept_power_scaling.md "Rep-rate shot design
# points".
e_driver_mj: 50.0          # MJ/shot — Polaris capacitor-bank energy (SOURCED)
yield_per_shot_mj: 101.4   # MJ/shot — reactor-target-anchored to Helion's sourced 50 MWe/1 Hz (derived, not disclosed)
max_f_rep: 1.0             # Hz — THIRD-PARTY plant rate (Polaris/NRC ~1 Hz; roadmap 1-10 Hz), not a Helion spec

# Pulsed parameters
f_rep: 1.0               # Repetition rate [Hz]
pulsed_conversion: inductive_dec
f_rad: 0.05              # Radiation fraction (D-He3, short burn)
eta_pin: 0.95            # Solid-state pulsed power wall-plug efficiency
driver_recovery_frac: 0.0  # Electrical driver, no mechanical recovery (see MAG_TARGET's anchored value)
eta_dec: 0.85            # Inductive DEC efficiency (coil-to-cap)
f_pdv: 0.80              # PdV work fraction

mn: 1.0              # No breeding blanket (no neutron multiplier)
f_sub: 0.03          # Subsystem power fraction
p_pump: 0.0          # No coolant pumping (no thermal BOP)
p_trit: 0.5          # Tritium monitoring from DD side reactions [MW]
p_house: 2.0         # Housekeeping power [MW]
p_cryo: 0.0          # No cryogenics (copper coils)
p_target: 0.0        # No manufactured targets (in-situ FRC formation)
target_unit_cost: 0.0    # $/shot — in-situ plasmoid formation, no fabricated target. See CAS80_target_consumables.md
p_coils: 0.5         # Formation/acceleration coils average power [MW]

# Coil parameters — copper pulsed coils (not HTS). b_center = peak field at the
# loop center during the shot (NOT field on the conductor surface).
coil_material: copper
b_center: 5.0        # Field at coil center [T] (pulsed copper, lower than HTS)
r_bore: 0.6          # Effective winding bore [m]

# Radial build geometry [m] (cylindrical, per module)
# Each module is a linear machine ~10m long with ~0.5m plasma radius.
R0: 0.0              # Linear geometry (no major radius)
plasma_t: 0.5        # Plasma / chamber radius [m]
blanket_t: 0.05      # Thin first wall only (no breeding blanket)
ht_shield_t: 0.05    # Minimal shielding (~5% neutron fraction)
structure_t: 0.10    # Primary structure
vessel_t: 0.10       # Vacuum vessel

# Construction
construction_time_yr: 4.0  # Factory-built modular assembly

# Fuel burn fraction defaults
burn_fraction: 0.15      # Single-pass burn fraction (Helion-class staged-compression FRC; MIF literature regime midpoint, vendor publishes Q, not burnup)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.0
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration (aneutronic-oriented concept: no breeding blanket)
blanket_form: none
blanket_fill: none

# Aneutronic first-wall hardware class (read only when blanket_form is none,
# i.e. p-B11/D-He3 fuel normalization): panel = actively-cooled W/steel wall
# (<= 2 MW/m^2 steady), hhf = divertor-grade monoblock wall (<= 10 MW/m^2),
# beam_dump = bare-CuCrZr beam-dump wall (<= 20 MW/m^2 through-wall).
# See costing_constants.yaml fw_unit_cost / fw_class_q_limit.
fw_class: panel
