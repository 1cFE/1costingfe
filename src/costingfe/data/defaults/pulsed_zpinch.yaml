# Default engineering parameters for IFE z-pinch
q_eng: 4.0               # Engineering gain target (P_et / P_recirc)
# Z-pinch: pulsed power driver, similar to IFE target model

f_rep: 0.1               # Repetition rate [Hz]
pulsed_conversion: thermal
f_rad: 0.10
eta_pin: 0.15            # Pulsed power wall-plug efficiency

# Target-yield sizing axis (DEFAULT for z-pinch via sizing_axis below). COMPANY
# sets the driver; PHYSICS sets the gain: yield = burn_fraction * m * e_DT,
# m = fuel_mass_mg_per_mj * e_driver. Anchored on the Sandia Z-IFE reactor DEMO
# point (Olson, "Z-Pinch IFE," FPA 2005; Matzen FPA 2008): ~40 MJ delivered to
# the pinch -> 3 GJ from a dynamic-hohlraum capsule at gain ~75 (band 50-100),
# 0.1 Hz per chamber, ~10-12 chambers -> 1 GWe. ASPIRATIONAL: 2D sims demonstrate
# only 0.4-0.5 GJ single-target at ~60 MA (Slutz/Vesey); 3 GJ needs the 90 MA
# driver. fuel_mass_mg_per_mj is calibrated so the physics yield reproduces the
# 3 GJ point. Add banks -> more current -> more yield (linear C220107 driver cost).
sizing_axis: target_yield  # grow the shot (up to e_driver_max) at max_f_rep, then replicate chambers
e_driver_mj: 40.0          # MJ/shot delivered to the pinch (Olson FPA05 table, upper end for the 3 GJ point)
yield_per_shot_mj: 3000.0  # MJ/shot (Sandia Z-IFE 3 GJ DEMO target; aspirational, sims show 0.4-0.5 GJ)
max_f_rep: 0.1             # Hz per chamber (Olson FPA05 / Matzen FPA08; RTL/liner-fabrication limited)
fuel_mass_mg_per_mj: 0.735 # DT assembled per delivered MJ, calibrated to reproduce 3 GJ at 40 MJ, phi=0.30 (implies ~29 mg DT)
e_driver_min_mj: 15.0
e_driver_max_mj: 60.0
wall_improvement_factor: 50.0  # thick-liquid wall assumed (PLACEHOLDER)
neutron_wall_load_max_mw_m2: 20.0  # thick-liquid neutron wall-load floor (PLACEHOLDER)
driver_recovery_frac: 0.0  # Electrical driver, no mechanical recovery (see MAG_TARGET's anchored value)
mn: 1.1              # Neutron energy multiplier
f_sub: 0.03          # Subsystem power fraction
p_pump: 1.0          # Pumping power [MW]
p_trit: 10.0         # Tritium processing power [MW]
p_house: 4.0         # Housekeeping power [MW]
p_cryo: 0.3          # Cryogenic power [MW]
p_target: 1.5        # Target/liner factory power [MW]
target_unit_cost: 6.0    # $/shot — bottom-up dynamic-hohlraum wire-array load (~4.9) + RTL remanufacturing (~1.2, net of recycling), 2024$. Per-shot consumable; RTL remelt/recast plant amortized here. Goodin/Alexander FPA 2007, Olson 2001. See CAS80_target_consumables.md
# Target factory (CAS22.01.08), three-term build-up; design total ~147 M$ at 0.1 Hz, 3.05 GW_fus. Wire-array/load shop: fixed-dominated at low rep; replaces the phantom laser-capsule factory. See CAS80_target_consumables.md
target_factory_capex_fixed: 130.0      # M$ — building + wire-array/load fabrication tooling + DT-fill containment + base line
target_factory_capex_per_hz: 15.0      # M$/Hz — marginal load/RTL production line (metal forming, not precision capsule fab)
target_factory_capex_per_gwfus: 5.0    # M$/GW_fus — debris/RTL handling (RTL remelt plant amortized per-shot in CAS80, not here)

# Radial build geometry [m] (spherical chamber)
R0: 0.0          # Not used for sphere
plasma_t: 3.5        # Chamber radius
blanket_t: 0.80      # Blanket thickness (DT breeding requirement)
ht_shield_t: 0.20    # High-temperature shield
structure_t: 0.15    # Primary structure
vessel_t: 0.10       # Vacuum vessel

# Construction
construction_time_yr: 4.0  # Years (simple pulsed system)

# Fuel burn fraction defaults (physics.py ash_neutron_split)
burn_fraction: 0.30      # Single-pass burn-up (Z-IFE dynamic-hohlraum capsule burns like an ICF capsule, ~30%; derived, not directly cited)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration
blanket_form: liquid_metal
blanket_fill: pbli

# Aneutronic first-wall hardware class (read only when blanket_form is none,
# i.e. p-B11/D-He3 fuel normalization): panel = actively-cooled W/steel wall
# (<= 2 MW/m^2 steady), hhf = divertor-grade monoblock wall (<= 10 MW/m^2),
# beam_dump = bare-CuCrZr beam-dump wall (<= 20 MW/m^2 through-wall).
# See costing_constants.yaml fw_unit_cost / fw_class_q_limit.
fw_class: panel
