# Default engineering parameters for Staged Z-Pinch (Zap Energy-like)
q_eng: 3.0               # Engineering gain target (P_et / P_recirc)
# Sheared-flow stabilized Z-pinch, pulsed formation.
# No manufactured targets — plasma forms from gas injection.
# Compact linear geometry.

# Module-replication sizing: per-module design net electric power. Zap Energy's
# DOE-approved design is a 50 MWe module ("future power plants will have multiple
# modules"); size_from_power solves n_mod = ceil(target / module_net_mwe). See
# docs/account_justification/concept_power_scaling.md.
module_net_mwe: 50.0     # 50 MWe per module (Zap Energy, ~10 Hz)

# Pulsed parameters
f_rep: 1.0               # Repetition rate [Hz]
pulsed_conversion: thermal
f_rad: 0.10
eta_pin: 0.20            # Pulsed power wall-plug efficiency

mn: 1.1              # Neutron energy multiplier
f_sub: 0.03
p_pump: 0.5          # Pumping power [MW]
p_trit: 10.0         # Tritium processing [MW]
p_house: 3.0         # Housekeeping [MW]
p_cryo: 0.0          # No cryogenics
p_target: 0.0        # No manufactured targets (gas injection)
target_unit_cost: 0.0    # $/shot — plasma forms from gas injection, no fabricated target. See CAS80_target_consumables.md
p_coils: 0.5         # Stabilization coils [MW]

# Radial build geometry [m] (cylindrical)
R0: 0.0
plasma_t: 1.5        # Chamber radius
blanket_t: 0.80      # Blanket thickness (DT breeding requirement)
ht_shield_t: 0.20    # Shield
structure_t: 0.15
vessel_t: 0.10

construction_time_yr: 5.0

# Fuel burn fraction defaults
burn_fraction: 0.10      # Single-pass burn fraction (LANL Rahman/Wessel staged Z-pinch designs)
fuel_recovery: 0.99         # Fraction of unburned fuel recovered and recycled (NOAK)
dd_f_T: 0.969
dd_f_He3: 0.689
dhe3_dd_frac: 0.131
dhe3_f_T: 0.5
pb11_f_alpha_n: 0.0
pb11_f_p_n: 0.0

# Blanket configuration
blanket_form: liquid_metal
blanket_fill: pbli
